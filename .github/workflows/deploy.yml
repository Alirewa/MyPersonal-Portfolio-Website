name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_N8N_WEBHOOK_URL: ''
          NEXT_PUBLIC_CV_URL: ''

      - name: Fix self-hosted font paths for subdirectory deployment
        run: |
          find out/_next/static -name "*.css" -type f -exec \
            sed -i "s|url('/fonts/|url('/MyPersonal-Portfolio-Website/fonts/|g" {} + 2>/dev/null || true
          find out/_next/static -name "*.css" -type f -exec \
            sed -i 's|url("/fonts/|url("/MyPersonal-Portfolio-Website/fonts/|g' {} + 2>/dev/null || true
          find out/_next/static -name "*.css" -type f -exec \
            sed -i 's|url(/fonts/|url(/MyPersonal-Portfolio-Website/fonts/|g' {} + 2>/dev/null || true

      - name: Add .nojekyll (disable Jekyll processing)
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
